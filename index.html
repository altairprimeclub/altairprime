<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Тату Маркетплейс — Прототип</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Панель управления справа */
        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            color: white;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
            pointer-events: auto;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .ui-panel h3 {
            margin: 0 0 10px 0;
            text-align: center;
        }
        .ui-panel label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            border: none;
            background: #2c2c3a;
            color: white;
            cursor: pointer;
        }
        button {
            background: #7c3aed;
            transition: 0.2s;
        }
        button:hover {
            background: #9b59b6;
        }
        .zone-buttons {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }
        .zone-buttons button {
            flex: 1;
            background: #3b3b4f;
        }
        .zone-buttons button.active {
            background: #e67e22;
            box-shadow: 0 0 5px orange;
        }
        .result {
            background: #1e1e2a;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: lime;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .ui-panel { width: 260px; top: 10px; right: 10px; padding: 10px; }
            .zone-buttons button { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="ui-panel">
        <h3>🎨 Тату-ателье 3D</h3>
        
        <label>👤 Пол:</label>
        <select id="gender">
            <option value="male">Мужчина</option>
            <option value="female">Женщина</option>
        </select>
        
        <label>📏 Рост (см):</label>
        <input type="range" id="height" min="0.7" max="1.3" step="0.01" value="1.0">
        
        <label>⚖️ Вес / Телосложение:</label>
        <input type="range" id="weight" min="0.6" max="1.4" step="0.01" value="1.0">
        
        <label>🎨 Цвет кожи:</label>
        <input type="color" id="skinColor" value="#d2a679">
        
        <label>📸 Загрузить своё лицо:</label>
        <input type="file" id="faceUpload" accept="image/jpeg, image/png">
        
        <label>🔥 Зона нанесения тату:</label>
        <div class="zone-buttons">
            <button data-zone="arm_right">Правая рука</button>
            <button data-zone="arm_left">Левая рука</button>
            <button data-zone="chest">Грудь</button>
        </div>
        
        <label>🖼️ Готовое тату (выбрать):</label>
        <select id="tattooPreset">
            <option value="dragon">Дракон (ч/б)</option>
            <option value="rose">Роза (цветная)</option>
            <option value="skull">Череп (ч/б)</option>
            <option value="tribal">Племенное (ч/б)</option>
        </select>
        
        <button id="generateAI">✨ Сгенерировать тату через ИИ (опционально)</button>
        <button id="applyTattoo">🎯 Нанести тату на выбранную зону</button>
        <button id="makeScreenshot">📸 Сделать скриншот</button>
        
        <div class="result" id="calculation">
            ⏳ Расчёт появится после нанесения тату
        </div>
        <button id="generateTZ" style="background:#2ecc71;">📄 Сформировать ТЗ для мастера</button>
    </div>
    <div class="status" id="status">✅ Система готова</div>

    <!-- Подключаем Three.js и расширения -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        
        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 2.5);
        camera.lookAt(0, 1, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true }); // preserveDrawingBuffer для скриншотов
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Управление
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 1, 0);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 3, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0xccaa88, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x88aaff, 0.4);
        backLight.position.set(0, 1.5, -2);
        scene.add(backLight);
        
        // Пол и фон
        const gridHelper = new THREE.GridHelper(5, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);
        
        // --- Переменные для модели ---
        let currentModel = null;
        let skinMaterial = null;
        let tattooSprite = null;      // Простое наложение (спрайт или плоскость)
        let currentTattooZone = 'arm_right';
        let tattooColorMode = 'bw';   // ч/б или цвет
        
        // Загрузчик GLTF
        const loader = new GLTFLoader();
        
        // Функция загрузки модели по полу
        function loadModel(gender) {
            if (currentModel) scene.remove(currentModel);
            // Используем две разные модели (из публичных ресурсов Three.js)
            // Мужчина: модель робота? Нет, лучше взять простую человеческую фигуру с открытой лицензией.
            // Для демонстрации используем разные скин-меши, но проще взять одну и ту же модель с заменой текстур.
            // Однако для убедительности: мужчина - высокая, женщина - чуть стройнее (масштаб)
            // Реально: я использую одну качественную модель человека (https://threejs.org/examples/models/gltf/RobotExpressive.glb - это робот, не подходит).
            // Возьмем модель из репозитория "Human.glb", но чтобы гарантировать работу, используем модель "Boy.glb" из примеров.
            // Но там нет UV для кожи. Поэтому сделаем проще: создадим примитивную фигуру из геометрий, на которую можно накладывать текстуры и легко менять цвет.
            // Это обеспечит 100% работоспособность без внешних моделей, которые могут не загрузиться.
            createProceduralHuman(gender);
        }
        
        // Создаём процедурного человека из простых мешей (тело, голова, руки, ноги) — полностью управляемый
        function createProceduralHuman(gender) {
            if (currentModel) scene.remove(currentModel);
            const group = new THREE.Group();
            
            // Цвет кожи по умолчанию
            const skinDefault = document.getElementById('skinColor').value;
            
            // Материалы
            const skinMat = new THREE.MeshStandardMaterial({ color: skinDefault, roughness: 0.3, metalness: 0.1 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x2c3e4e });
            const shirtMat = new THREE.MeshStandardMaterial({ color: gender === 'male' ? 0x34495e : 0x9b59b6 });
            
            // Туловище
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.35), skinMat);
            torso.position.set(0, 0.6, 0);
            torso.castShadow = true;
            torso.receiveShadow = true;
            group.add(torso);
            
            // Голова
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), skinMat);
            head.position.set(0, 1.1, 0);
            head.castShadow = true;
            group.add(head);
            
            // Глаза (для жизни)
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), eyeMat);
            leftEye.position.set(-0.12, 1.18, 0.28);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), eyeMat);
            rightEye.position.set(0.12, 1.18, 0.28);
            group.add(rightEye);
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 24, 24), pupilMat);
            leftPupil.position.set(-0.12, 1.18, 0.33);
            group.add(leftPupil);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 24, 24), pupilMat);
            rightPupil.position.set(0.12, 1.18, 0.33);
            group.add(rightPupil);
            
            // Руки (цилиндры)
            const armMat = new THREE.MeshStandardMaterial({ color: skinDefault, roughness: 0.4 });
            const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.65, 8), armMat);
            leftArm.position.set(-0.45, 0.95, 0);
            leftArm.rotation.z = 0.3;
            leftArm.rotation.x = -0.2;
            group.add(leftArm);
            
            const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.65, 8), armMat);
            rightArm.position.set(0.45, 0.95, 0);
            rightArm.rotation.z = -0.3;
            rightArm.rotation.x = 0.2;
            group.add(rightArm);
            
            // Ноги
            const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e4e });
            const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.7, 8), legMat);
            leftLeg.position.set(-0.2, 0.25, 0);
            group.add(leftLeg);
            const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.7, 8), legMat);
            rightLeg.position.set(0.2, 0.25, 0);
            group.add(rightLeg);
            
            // Сохраняем ссылки на части для изменения цвета кожи и текстуры лица
            group.userData = {
                torso, head, leftArm, rightArm,
                skinMat: skinMat,
                armMat: armMat
            };
            
            currentModel = group;
            scene.add(currentModel);
            
            // Применяем текущие настройки веса/роста/цвета
            updateBodyParams();
        }
        
        // Обновление параметров модели
        function updateBodyParams() {
            if (!currentModel) return;
            const heightVal = parseFloat(document.getElementById('height').value);
            const weightVal = parseFloat(document.getElementById('weight').value);
            currentModel.scale.set(weightVal, heightVal, weightVal);
            
            const skinColor = document.getElementById('skinColor').value;
            const data = currentModel.userData;
            if (data && data.skinMat) {
                data.skinMat.color.set(skinColor);
                if (data.armMat) data.armMat.color.set(skinColor);
            }
            // Обработка текстуры лица, если загружена
            if (faceTexture) {
                applyFaceTexture(faceTexture);
            }
        }
        
        let faceTexture = null;
        function applyFaceTexture(texture) {
            if (!currentModel || !currentModel.userData.head) return;
            const headMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3 });
            currentModel.userData.head.material = headMat;
        }
        
        // Загрузка фото лица
        document.getElementById('faceUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = () => {
                const texture = new THREE.CanvasTexture(img);
                texture.needsUpdate = true;
                faceTexture = texture;
                applyFaceTexture(texture);
                document.getElementById('status').innerText = '✅ Лицо загружено на модель';
            };
            img.src = URL.createObjectURL(file);
        });
        
        // --- Тату: создаём плоскую картинку, которая следует за выбранной зоной ---
        let currentTattooMesh = null;
        
        function getZonePosition(zone) {
            // Позиции относительно центра модели (модель стоит в центре)
            switch(zone) {
                case 'arm_right': return { x: 0.65, y: 0.95, z: 0.15 };
                case 'arm_left': return { x: -0.65, y: 0.95, z: 0.15 };
                case 'chest': return { x: 0, y: 0.75, z: 0.32 };
                default: return { x: 0.5, y: 0.9, z: 0.2 };
            }
        }
        
        async function loadTattooImage(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const texture = new THREE.CanvasTexture(img);
                    texture.needsUpdate = true;
                    resolve(texture);
                };
                img.onerror = () => resolve(null);
                img.src = src;
            });
        }
        
        // Предустановленные тату (локальные DataURI для надёжности)
        const tattooPresets = {
            dragon: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAFUlEQVQYV2P8//8/AzAiM2JkYGAAAGKUA+fcC4YzAAAAAElFTkSuQmCC", // заглушка
            rose: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAGUlEQVQYV2P8//8/AyNkYWJg+M8ABWAGAF2pA/8M5CtwAAAAAElFTkSuQmCC",
            skull: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAGUlEQVQYV2P8//8/AzJhYWBgYICyGBgYAGVQA6U+wV4+AAAAAElFTkSuQmCC",
            tribal: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAGUlEQVQYV2P8//8/AyNjYGD4zwAFYAYAWykD/zlojCQAAAAASUVORK5CYII="
        };
        
        async function applyTattoo() {
            const zone = currentTattooZone;
            const preset = document.getElementById('tattooPreset').value;
            let imageUrl = tattooPresets[preset];
            // Если хотим реальную картинку из сети, можно подставить, но для надёжности используем пресеты.
            // Для красоты заменим на реальные изображения с прозрачностью (ссылки на png с сервера, но лучше dataURI).
            // Я добавлю реальные маленькие картинки для демонстрации, используя внешний ресурс (надёжный).
            if (preset === 'dragon') imageUrl = 'https://cdn.pixabay.com/photo/2021/08/25/17/39/dragon-6573676_1280.png'; // не прозрачный, но пример
            if (preset === 'rose') imageUrl = 'https://cdn.pixabay.com/photo/2018/01/14/18/19/rose-3082588_1280.png';
            // Используем рабочие ссылки, но они могут быть большими. В реальном коде лучше локальные.
            // Для гарантии я использую canvas рисование текста (простое тату).
            // Создадим canvas тату динамически.
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = preset === 'rose' ? '#ff69b4' : '#000000';
            ctx.font = 'Bold 40px "Segoe UI"';
            ctx.fillText(preset === 'dragon' ? '🐉' : (preset === 'rose' ? '🌹' : (preset === 'skull' ? '💀' : '🌀')), 80, 140);
            ctx.fillStyle = '#aaa';
            ctx.font = '20px sans-serif';
            ctx.fillText('tattoo', 80, 200);
            const texture = new THREE.CanvasTexture(canvas);
            
            // Удалить старое тату
            if (currentTattooMesh) currentModel.remove(currentTattooMesh);
            
            const pos = getZonePosition(zone);
            const planeMat = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide, transparent: true });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.35), planeMat);
            plane.position.set(pos.x, pos.y, pos.z);
            plane.lookAt(0, pos.y, 0);
            plane.castShadow = false;
            currentModel.add(plane);
            currentTattooMesh = plane;
            
            // Определяем цветность (просто по пресету)
            tattooColorMode = (preset === 'rose') ? 'color' : 'bw';
            calculateTattooResources();
            document.getElementById('status').innerText = `✅ Тату нанесено на ${zone === 'arm_right' ? 'правую руку' : zone === 'arm_left' ? 'левую руку' : 'грудь'}`;
        }
        
        function calculateTattooResources() {
            // Площадь условно: 30-100 кв.см
            const area = 45 + Math.floor(Math.random() * 40);
            const inkPerCm = tattooColorMode === 'color' ? 0.12 : 0.08;
            const inkMl = (area * inkPerCm).toFixed(1);
            let hours = (area / 25).toFixed(1);
            if (tattooColorMode === 'color') hours = (parseFloat(hours) * 1.3).toFixed(1);
            document.getElementById('calculation').innerHTML = `
                📐 Площадь: ~${area} см²<br>
                💧 Краски: ${inkMl} мл (${tattooColorMode === 'color' ? 'цветная' : 'ч/б'})<br>
                ⏱️ Время: ${hours} часов
            `;
        }
        
        document.getElementById('applyTattoo').addEventListener('click', applyTattoo);
        
        // Выбор зоны
        document.querySelectorAll('[data-zone]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTattooZone = btn.getAttribute('data-zone');
                document.querySelectorAll('[data-zone]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('status').innerText = `📍 Выбрана зона: ${btn.innerText}`;
            });
        });
        // Активировать первую зону
        document.querySelector('[data-zone="arm_right"]').classList.add('active');
        
        // Генерация через ИИ (имитация запроса, т.к. нужен ключ)
        document.getElementById('generateAI').addEventListener('click', async () => {
            document.getElementById('status').innerText = '🤖 Генерация тату через ИИ... (имитация)';
            // В реальности здесь был бы fetch к Replicate/DeepAI, но без ключа не работает.
            // Создаём случайное тату на канвасе
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,256,256);
            ctx.fillStyle = 'black';
            ctx.font = '20px monospace';
            ctx.fillText('AI tattoo', 60, 130);
            const texture = new THREE.CanvasTexture(canvas);
            if (currentTattooMesh) currentModel.remove(currentTattooMesh);
            const pos = getZonePosition(currentTattooZone);
            const planeMat = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide, transparent: true });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.35), planeMat);
            plane.position.set(pos.x, pos.y, pos.z);
            plane.lookAt(0, pos.y, 0);
            currentModel.add(plane);
            currentTattooMesh = plane;
            tattooColorMode = 'bw';
            calculateTattooResources();
            document.getElementById('status').innerText = '✨ Сгенерировано уникальное тату (демо)';
        });
        
        // Скриншот
        document.getElementById('makeScreenshot').addEventListener('click', () => {
            renderer.render(scene, camera);
            const canvas = renderer.domElement;
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'tattoo_model.png';
            link.click();
            document.getElementById('status').innerText = '📸 Скриншот сохранён';
        });
        
        // ТЗ
        document.getElementById('generateTZ').addEventListener('click', () => {
            const calcText = document.getElementById('calculation').innerHTML;
            const zoneName = document.querySelector('[data-zone].active')?.innerText || 'правая рука';
            const tz = `
=== ТЕХНИЧЕСКОЕ ЗАДАНИЕ ДЛЯ МАСТЕРА ===
Клиент: 3D примерка
Локация тату: ${zoneName}
${calcText.replace(/<br>/g, '\n').replace(/<\/?[^>]+(>|$)/g, '')}
